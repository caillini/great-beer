<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a1a1aa" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a1a1aa" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Beer mug body -->
  <rect x="120" y="140" width="200" height="260" rx="16" fill="url(#glass)" stroke="#71717a" stroke-width="4"/>
  <!-- Beer liquid -->
  <rect x="128" y="195" width="184" height="197" rx="12" fill="url(#beer)"/>
  <!-- Foam top -->
  <ellipse cx="220" cy="195" rx="92" ry="20" fill="url(#foam)"/>
  <circle cx="160" cy="175" r="22" fill="url(#foam)"/>
  <circle cx="200" cy="168" r="26" fill="url(#foam)"/>
  <circle cx="245" cy="170" r="24" fill="url(#foam)"/>
  <circle cx="280" cy="178" r="20" fill="url(#foam)"/>
  <!-- Mug handle -->
  <path d="M320 200 Q380 200 380 280 Q380 360 320 360" fill="none" stroke="#71717a" stroke-width="16" stroke-linecap="round"/>
  <!-- Bubbles -->
  <circle cx="170" cy="320" r="6" fill="#fef3c7" opacity="0.5"/>
  <circle cx="220" cy="350" r="4" fill="#fef3c7" opacity="0.4"/>
  <circle cx="250" cy="290" r="5" fill="#fef3c7" opacity="0.5"/>
  <circle cx="190" cy="270" r="4" fill="#fef3c7" opacity="0.3"/>
  <circle cx="260" cy="340" r="3" fill="#fef3c7" opacity="0.4"/>
  <circle cx="200" cy="310" r="5" fill="#fef3c7" opacity="0.35"/>
  <!-- Star rating accent -->
  <text x="256" y="460" text-anchor="middle" font-size="36" fill="#f59e0b">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
</svg>
